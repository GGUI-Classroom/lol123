<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clients - Eclix</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>

<body>

  <!-- Top Bar -->
  <div class="top-bar">
    <img class="logo" src="assets/logo.png" alt="Eclix Logo">
    <ul>
      <li onclick="location.href='index.html'">Home</li>
      <li onclick="location.href='clients.html'">Clients</li>
    </ul>
    <a class="discord-btn" href="https://discord.gg/2EDdGj2ZQp">Discord</a>
  </div>

  <div class="page-content">
    <h1 class="page-title">Clients</h1>

    <section class="clients-grid">

      <div class="client-card">
        <h3>EaglercraftX</h3>
        <span class="version-badge">1.8.8</span>
        <p>Official Client</p>

        <div class="button-group">

          <button class="launch-btn"
            onclick="launchClient('https://eaglercrafthub.github.io/assets/clients/EaglercraftX_1.8_u53_Offline_Signed.html')">
            Launch
          </button>

          <button class="fullscreen-btn"
            onclick="launchFullscreen('https://eaglercrafthub.github.io/assets/clients/EaglercraftX_1.8_u53_Offline_Signed.html')">
            Fullscreen
          </button>

          <!-- FIXED DOWNLOAD BUTTON -->
          <a class="download-btn"
             href="https://eaglercrafthub.github.io/assets/clients/EaglercraftX_1.8_u53_Offline_Signed.html"
             download>
            Download
          </a>

        </div>
      </div>

     
      <div class="client-card">
        <h3>Starlike Client</h3>
        <span class="version-badge">1.8.8</span>
        <p>Unofficial Client</p>
      
      
      <div class="button-group">

          <button class="launch-btn"
            onclick="launchClient('https://eaglercrafthub.github.io/assets/clients/Eaglercraft_IR_StarLikeClient_0.4.2.html')">
            Launch
          </button>

          <button class="fullscreen-btn"
            onclick="launchFullscreen('https://eaglercrafthub.github.io/assets/clients/Eaglercraft_IR_StarLikeClient_0.4.2.html')">
            Fullscreen
          </button>

          <!-- FIXED DOWNLOAD BUTTON -->
          <a class="download-btn"
             href="https://eaglercrafthub.github.io/assets/clients/Eaglercraft_IR_StarLikeClient_0.4.2.html"
             download>
            Download
          </a>

        </div>
      </div>

    </section>
  </div>

  <!-- CLIENT VIEWER -->
  <div id="client-section">
    <div class="viewer-header">
      <span>Client Running</span>
      <button onclick="closeClient()" class="close-btn">Close</button>
    </div>

    <div id="loading-screen">
      <div class="spinner"></div>
      <span>Loading Client...</span>
    </div>

    <iframe id="client-frame"></iframe>
  </div>

  <div class="footer">© 2026 Eclix</div>

<script>
function launchClient(url) {
  const section = document.getElementById("client-section");
  const frame = document.getElementById("client-frame");
  const loader = document.getElementById("loading-screen");

  section.style.display = "block";
  loader.style.display = "flex";
  frame.style.opacity = "0";
  frame.src = url;

  frame.onload = () => {
    loader.style.display = "none";
    frame.style.opacity = "1";
  };

  section.scrollIntoView({ behavior: "smooth" });
}

function launchFullscreen(url) {
  const frame = document.getElementById("client-frame");
  const section = document.getElementById("client-section");

  section.style.display = "block";
  frame.src = url;

  frame.onload = () => {
    frame.requestFullscreen?.();
  };
}

function closeClient() {
  const section = document.getElementById("client-section");
  const frame = document.getElementById("client-frame");

  frame.src = "";
  section.style.display = "none";
}
</script>

</body>
</html>
